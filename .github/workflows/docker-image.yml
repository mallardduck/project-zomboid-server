name: Create and publish a Docker image

on:
  workflow_dispatch:
  push:
    branches: ['main']
  schedule:
    - cron: "12 4 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          # B41 stable — tagged :b41 and :latest
          - branch: ""
            tag: "b41"
            extra_tag: "latest"
          # B42 unstable beta — tagged :b42
          - branch: "unstable"
            tag: "b42"
            extra_tag: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS="${BASE}:${{ matrix.tag }}"
          if [[ -n "${{ matrix.extra_tag }}" ]]; then
            TAGS="${TAGS},${BASE}:${{ matrix.extra_tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            STEAM_BETA_BRANCH=${{ matrix.branch }}
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
