version: "3"

services:
  main-server:
    container_name: zomboid_app
    build: .
    restart: always
    environment:
      - SERVER_RAM=16g
      # Uncomment for the B42 beta branch, or leave blank for B41 stable.
      # - STEAM_BETA_BRANCH=unstable
    volumes:
      - zomboid_app:/home/steam/project-zomboid-dedicated/:rw

volumes:
    zomboid_app:
        external: true
